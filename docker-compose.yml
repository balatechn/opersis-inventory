version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opersis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opersis_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-opersis_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opersis} -d ${POSTGRES_DB:-opersis_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-opersis}:${POSTGRES_PASSWORD:-opersis_secret_2024}@db:5432/${POSTGRES_DB:-opersis_db}
      JWT_SECRET: ${JWT_SECRET:-opersis-jwt-secret-change-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
